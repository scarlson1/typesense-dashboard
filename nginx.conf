# nginx template for the static dashboard. ${PORT} is substituted at container
# start by the official nginx image's envsubst entrypoint.
# Routing is hash-based, so no SPA-fallback rewrite is needed; a plain 404 for
# unknown files is fine since the app always loads from index.html.
server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets, always revalidate the HTML entrypoint.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
