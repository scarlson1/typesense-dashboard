name: Build Electron installers

on:
  push:
    tags:
      - 'v*.*.*'
  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write # needed to publish installers to GitHub Releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.18.3'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Set version
        id: vars
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"
      - name: Build & package
        # On a version tag (v*.*.*) publish a GitHub Release (draft by default —
        # review the per-OS installers, then hit Publish). Manual dispatch runs
        # build artifacts only. Builds are unsigned until signing secrets are
        # added (see docs/electron-deployment-plan.md → Code signing).
        run: pnpm electron:build && pnpm exec electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_APP_VERSION: ${{ steps.vars.outputs.tag }}
          # No VITE_MAPBOX_TOKEN here: released installers ship without a baked
          # token so they don't leak the maintainer's key. Each user supplies
          # their own Mapbox token in-app (stored locally) to enable geosearch.
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.zip
