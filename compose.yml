services:
  typesense-dashboard:
    # env_file: .env.local
    build: .
    ports:
      - '5173:5173'
    develop:
      watch:
        - path: ./src
          target: /app/src
          action: sync
          ignore:
            - node_modules/
        - path: package.json
          action: rebuild

  # optionally start up typesense cluster for development
  typesense:
    image: typesense/typesense:29.0
    restart: on-failure
    env_file:
      - .env
      # - .env.development
    ports:
      - '8108:8108' # For HTTP (not recommended for production)
      - '443:443' # For HTTPS
    volumes:
      - ${TYPESENSE_DATA_PATH}:/data
      - ${TYPESENSE_CERTS_PATH}:/etc/ssl/certs
    environment:
      - TYPESENSE_API_KEY=xyz
      - TYPESENSE_DATA_DIR=/data
      - SSL_CERTIFICATE=/etc/ssl/certs/localhost+1.pem
      - SSL_CERTIFICATE_KEY=/etc/ssl/certs/localhost+1-key.pem
    command: '--data-dir=/data --api-key=xyz --enable-cors --api-port=443 --ssl-certificate=/etc/ssl/certs/localhost+1.pem --ssl-certificate-key=/etc/ssl/certs/localhost+1-key.pem'
    #   - SSL_CERTIFICATE=/etc/ssl/certs/typesense.dev.crt
    #   - SSL_CERTIFICATE_KEY=/etc/ssl/certs/typesense.dev.key
    # command: '--data-dir=/data --api-key=xyz --enable-cors --api-port=443 --ssl-certificate=/etc/ssl/certs/typesense.dev.crt --ssl-certificate-key=/etc/ssl/certs/typesense.dev.key'

  # optionally run ngrok image for https (if connecting to github pages etc.)
